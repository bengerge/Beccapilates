<div class="toast-container">
  @for (toast of toastService.toasts(); track toast.id) {
    <div class="toast-item" [ngClass]="toast.type">
      <div class="toast-icon">
        @if (toast.type === 'success') { <span>✓</span> }
        @if (toast.type === 'error') { <span>✕</span> }
        @if (toast.type === 'info') { <span>ℹ</span> }
      </div>
      <div class="toast-message">{{ toast.message }}</div>
      <button class="toast-close" (click)="toastService.remove(toast.id)">&times;</button>
    </div>
  }
</div>
